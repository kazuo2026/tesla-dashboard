<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tesla Dashboard</title>

<style>

body{
    margin:0;
    background:#000;
    color:#E0E0E0;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* ========================= */
/* 上部 */
/* ========================= */

.top-bar{

    height:190px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:20px 40px;

    box-sizing:border-box;
}

/* ========================= */
/* 左側 */
/* ========================= */

.left-section{

    display:flex;

    align-items:center;

    gap:30px;
}

/* ========================= */
/* アナログ時計 */
/* ========================= */

.analog-clock{

    width:180px;

    height:180px;

    border:4px solid #E0E0E0;

    border-radius:50%;

    position:relative;
}

.center-dot{

    position:absolute;

    width:12px;

    height:12px;

    background:#E0E0E0;

    border-radius:50%;

    left:50%;

    top:50%;

    transform:translate(-50%,-50%);
}

.hand{

    position:absolute;

    left:50%;

    top:50%;

    transform-origin:bottom center;

    border-radius:10px;
}

/* 時針 */

.hour{

    width:6px;

    height:50px;

    background:#E0E0E0;

    margin-left:-3px;

    margin-top:-50px;
}

/* 分針 */

.minute{

    width:4px;

    height:70px;

    background:#E0E0E0;

    margin-left:-2px;

    margin-top:-70px;
}

/* ========================= */
/* デジタル時計 */
/* ========================= */

#clock{

    font-size:140px;

    font-weight:bold;

    line-height:1;
}

#date{

    font-size:34px;

    margin-top:10px;
}

/* ========================= */
/* 天気 */
/* ========================= */

.weather{

    width:430px;

    text-align:right;
}

.current-weather{

    font-size:48px;

    margin-bottom:15px;
}

.hourly{

    font-size:22px;

    line-height:1.6;
}

.weekly{

    margin-top:10px;

    font-size:20px;

    line-height:1.6;
}

/* ========================= */
/* 地図 */
/* ========================= */

.map-area{

    width:100%;

    height:calc(100vh - 340px);
}

.map-area iframe{

    width:100%;

    height:100%;

    border:none;
}

/* ========================= */
/* テロップ */
/* ========================= */

.ticker{

    width:100%;

    height:50px;

    background:#111;

    overflow:hidden;

    white-space:nowrap;

    line-height:50px;

    font-size:28px;
}

.ticker-text{

    display:inline-block;

    padding-left:100%;

    animation:scroll 40s linear infinite;
}

@keyframes scroll{

    0%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(-100%);
    }
}

.news{

    position:absolute;

    bottom:50px;
}

.traffic{

    position:absolute;

    bottom:0;
}

</style>

</head>

<body>

<!-- ========================= -->
<!-- 上部 -->
<!-- ========================= -->

<div class="top-bar">

    <!-- 左 -->

    <div class="left-section">

        <!-- アナログ時計 -->

        <div class="analog-clock">

            <div class="hand hour" id="hour-hand"></div>

            <div class="hand minute" id="minute-hand"></div>

            <div class="center-dot"></div>

        </div>

        <!-- デジタル -->

        <div>

            <div id="clock"></div>

            <div id="date"></div>

        </div>

    </div>

    <!-- 右：天気 -->

    <div class="weather">

        <div class="current-weather" id="current-weather">

            読み込み中...

        </div>

        <div class="hourly" id="hourly-weather">

        </div>

        <div class="weekly" id="weekly-weather">

        </div>

    </div>

</div>

<!-- ========================= -->
<!-- 地図 -->
<!-- ========================= -->

<div class="map-area">

<iframe
src="https://www.google.com/maps?q=Tokyo&output=embed"
allowfullscreen>
</iframe>

</div>

<!-- ========================= -->
<!-- ニュース -->
<!-- ========================= -->

<div class="ticker news">

    <div class="ticker-text" id="news-ticker">

        ニュース読み込み中...

    </div>

</div>

<!-- ========================= -->
<!-- 交通 -->
<!-- ========================= -->

<div class="ticker traffic">

    <div class="ticker-text">

        【TRAFFIC】首都高 概ね順調　東名高速 一部渋滞

    </div>

</div>

<script>

/* ========================= */
/* 時計 */
/* ========================= */

function updateClock(){

    const now = new Date();

    /* デジタル */

    document.getElementById("clock").innerHTML =

        now.toLocaleTimeString('ja-JP',{

            hour:'2-digit',

            minute:'2-digit'

        });

    /* 日付 */

    document.getElementById("date").innerHTML =

        now.toLocaleDateString('ja-JP',{

            year:'numeric',

            month:'long',

            day:'numeric',

            weekday:'long'

        });

    /* アナログ */

    const min = now.getMinutes();

    const hour = now.getHours();

    const minDeg = min * 6;

    const hourDeg = hour * 30 + min * 0.5;

    document.getElementById("minute-hand").style.transform =

        `rotate(${minDeg}deg)`;

    document.getElementById("hour-hand").style.transform =

        `rotate(${hourDeg}deg)`;
}

setInterval(updateClock,1000);

updateClock();

/* ========================= */
/* 天気 */
/* ========================= */

const apiKey = "ここにOpenWeatherAPIキー";

const city = "Tokyo";

fetch(

https://api.openweathermap.org/data/2.5/forecast?q=${city}&units=metric&lang=ja&appid=${apiKey}

)

.then(response => response.json())

.then(data => {

    const current = data.list[0];

    document.getElementById("current-weather").innerHTML =

        `${current.weather[0].icon.includes("d") ? "☀" : "☁"} ${Math.round(current.main.temp)}℃`;

    let hourlyHTML = "";

    for(let i=0;i<3;i++){

        const item = data.list[i];

        const time = item.dt_txt.substring(11,16);

        hourlyHTML +=

            `${time} ${Math.round(item.main.temp)}℃ ${item.weather[0].description}<br>`;
    }

    document.getElementById("hourly-weather").innerHTML = hourlyHTML;

    let weeklyHTML = "";

    for(let i=0;i<5;i++){

        const item = data.list[i*8];

        if(!item) continue;

        const date = new Date(item.dt_txt);

        const weekday = ["日","月","火","水","木","金","土"][date.getDay()];

        weeklyHTML +=

            `${weekday} ${Math.round(item.main.temp)}℃ ${item.weather[0].description}<br>`;
    }

    document.getElementById("weekly-weather").innerHTML = weeklyHTML;

});

/* ========================= */
/* RSS */
/* ========================= */

/*
後でGAS URLへ変更

例：
fetch("GASのURL")
*/

document.getElementById("news-ticker").innerHTML =

"【NEWS】NHK RSS連携予定　最新ニュース表示";

</script>

</body>

</html>
