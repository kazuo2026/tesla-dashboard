<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tesla Dashboard</title>

<style>

body{

    margin:0;

    background:#000;

    color:#E0E0E0;

    font-family:Arial,sans-serif;
}

/* ========================= */
/* アナログ時計 */
/* ========================= */

.clock-container{

    display:flex;

    align-items:center;

    gap:35px;

    padding:30px;
}

.analog-clock{

    width:220px;

    height:220px;

    border:5px solid #E0E0E0;

    border-radius:50%;

    position:relative;

    background:#050505;

    box-shadow:
        0 0 25px rgba(255,255,255,0.08),
        inset 0 0 25px rgba(255,255,255,0.05);
}

/* ========================= */
/* 目盛り */
/* ========================= */

.mark{

    position:absolute;

    width:4px;

    height:18px;

    background:#E0E0E0;

    left:50%;

    top:6px;

    transform-origin:center 104px;
}

/* 長い目盛り */

.mark.major{

    width:5px;

    height:28px;
}

/* ========================= */
/* 中心 */
/* ========================= */

.center-dot{

    position:absolute;

    width:16px;

    height:16px;

    background:#E0E0E0;

    border-radius:50%;

    top:50%;

    left:50%;

    transform:translate(-50%,-50%);

    z-index:10;
}

/* ========================= */
/* 針 */
/* ========================= */

.hand{

    position:absolute;

    bottom:50%;

    left:50%;

    transform-origin:bottom center;

    border-radius:10px;
}

/* 時針 */

.hour-hand{

    width:8px;

    height:60px;

    background:#E0E0E0;

    margin-left:-4px;

    z-index:5;
}

/* 分針 */

.minute-hand{

    width:5px;

    height:85px;

    background:#FFFFFF;

    margin-left:-2.5px;

    z-index:6;
}

/* ========================= */
/* デジタル */
/* ========================= */

.digital{

    display:flex;

    flex-direction:column;

    justify-content:center;
}

#clock{

    font-size:150px;

    font-weight:700;

    line-height:1;
}

#date{

    font-size:34px;

    margin-top:10px;
}

</style>

</head>

<body>

<div class="clock-container">

    <!-- アナログ時計 -->

    <div class="analog-clock" id="analog-clock">

        <!-- 目盛り自動生成 -->

        <div class="center-dot"></div>

        <div class="hand hour-hand" id="hour-hand"></div>

        <div class="hand minute-hand" id="minute-hand"></div>

    </div>

    <!-- デジタル -->

    <div class="digital">

        <div id="clock"></div>

        <div id="date"></div>

    </div>

</div>

<script>

/* ========================= */
/* 目盛り生成 */
/* ========================= */

const clock = document.getElementById("analog-clock");

for(let i=0;i<60;i++){

    const mark = document.createElement("div");

    mark.classList.add("mark");

    if(i % 5 === 0){

        mark.classList.add("major");
    }

    mark.style.transform = `translateX(-50%) rotate(${i*6}deg)`;

    clock.appendChild(mark);
}

/* ========================= */
/* 時計更新 */
/* ========================= */

function updateClock(){

    const now = new Date();

    const hours = now.getHours();

    const minutes = now.getMinutes();

    /* デジタル */

    document.getElementById("clock").innerHTML =

        now.toLocaleTimeString('ja-JP',{

            hour:'2-digit',

            minute:'2-digit'

        });

    document.getElementById("date").innerHTML =

        now.toLocaleDateString('ja-JP',{

            year:'numeric',

            month:'long',

            day:'numeric',

            weekday:'long'

        });

    /* アナログ */

    const hourDeg = (hours % 12) * 30 + minutes * 0.5;

    const minuteDeg = minutes * 6;

    document.getElementById("hour-hand").style.transform =

        `translateX(-50%) rotate(${hourDeg}deg)`;

    document.getElementById("minute-hand").style.transform =

        `translateX(-50%) rotate(${minuteDeg}deg)`;
}

setInterval(updateClock,1000);

updateClock();

</script>

</body>

</html>
