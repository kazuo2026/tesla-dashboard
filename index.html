<!DOCTYPE html>
<html lang="ja">

<head>

<style>

body{
    background:#000;
    color:#E0E0E0;
    font-family:Arial;
    text-align:center;
    margin:0;
}

#clock{
    font-size:220px;
    margin-top:80px;
    font-weight:bold;
}

#date{
    font-size:50px;
}

#weather{
    margin-top:50px;
    font-size:60px;
}

.news{
    position:absolute;
    bottom:0;
    width:100%;
    height:70px;
    line-height:70px;
    background:#111;
    overflow:hidden;
}

.news-text{
    display:inline-block;
    padding-left:100%;
    animation:scroll 20s linear infinite;
    font-size:36px;
}

@keyframes scroll{
    100%{
        transform:translateX(-100%);
    }
}

</style>

</head>

<body>

<div id="clock"></div>

<div id="date"></div>

<div id="weather">
28℃
☀ 晴れ
</div>

<div class="news">
<div class="news-text">
最新ニュース　安全運転でいきましょう
</div>
</div>

<script>

function updateClock(){

    const now = new Date();

    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString('ja-JP',{
            hour:'2-digit',
            minute:'2-digit'
        });

    document.getElementById("date").innerHTML =
        now.toLocaleDateString('ja-JP',{
            year:'numeric',
            month:'long',
            day:'numeric',
            weekday:'long'
        });
}

setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>
