<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tesla Dashboard</title>

<style>

body{
    margin:0;
    background:#000;
    color:#E0E0E0;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* ===================== */
/* 上段 */
/* ===================== */

.top-bar{

    height:180px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:20px 40px;

    box-sizing:border-box;
}

/* ===================== */
/* アナログ時計 */
/* ===================== */

.analog-clock{

    width:140px;

    height:140px;

    border:4px solid #E0E0E0;

    border-radius:50%;

    position:relative;
}

.hand{

    position:absolute;

    bottom:50%;

    left:50%;

    transform-origin:bottom;

    background:#E0E0E0;
}

.hour{

    width:6px;

    height:40px;

    margin-left:-3px;
}

.minute{

    width:4px;

    height:55px;

    margin-left:-2px;
}

.second{

    width:2px;

    height:65px;

    margin-left:-1px;

    background:#888;
}

/* ===================== */
/* デジタル時計 */
/* ===================== */

#clock{

    font-size:110px;

    font-weight:bold;

    line-height:1;
}

/* ===================== */
/* 日付 */
/* ===================== */

#date{

    font-size:34px;

    margin-top:10px;
}

/* ===================== */
/* 天気 */
/* ===================== */

.weather{

    width:420px;

    text-align:right;
}

.current-weather{

    font-size:42px;

    margin-bottom:10px;
}

.hourly{

    font-size:22px;

    line-height:1.6;
}

.weekly{

    margin-top:10px;

    font-size:20px;

    line-height:1.5;
}

/* ===================== */
/* 中央地図 */
/* ===================== */

.map-area{

    width:100%;

    height:calc(100vh - 320px);
}

.map-area iframe{

    width:100%;

    height:100%;

    border:none;
}

/* ===================== */
/* テロップ */
/* ===================== */

.ticker{

    width:100%;

    height:50px;

    background:#111;

    overflow:hidden;

    white-space:nowrap;

    line-height:50px;

    font-size:28px;
}

.ticker-text{

    display:inline-block;

    padding-left:100%;

    animation:scroll 25s linear infinite;
}

@keyframes scroll{

    0%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(-100%);
    }
}

.news{

    position:absolute;

    bottom:50px;
}

.traffic{

    position:absolute;

    bottom:0;
}

</style>

</head>

<body>

<!-- ===================== -->
<!-- 上段 -->
<!-- ===================== -->

<div class="top-bar">

    <!-- 左 -->
    <div style="display:flex; align-items:center; gap:30px;">

        <!-- アナログ時計 -->
        <div class="analog-clock">

            <div class="hand hour" id="hour-hand"></div>

            <div class="hand minute" id="minute-hand"></div>

            <div class="hand second" id="second-hand"></div>

        </div>

        <!-- デジタル -->
        <div>

            <div id="clock"></div>

            <div id="date"></div>

        </div>

    </div>

    <!-- 右 -->
    <div class="weather">

        <div class="current-weather">

            ☀ 28℃

        </div>

        <div class="hourly">

            18時 ☀ 27℃<br>

            21時 ☁ 24℃<br>

            24時 ☔ 22℃

        </div>

        <div class="weekly">

            木 ☀ 29℃<br>

            金 ☁ 26℃<br>

            土 ☔ 22℃

        </div>

    </div>

</div>

<!-- ===================== -->
<!-- 地図 -->
<!-- ===================== -->

<div class="map-area">

<iframe
src="https://www.google.com/maps/embed?pb=!1m18"
allowfullscreen>
</iframe>

</div>

<!-- ===================== -->
<!-- ニュース -->
<!-- ===================== -->

<div class="ticker news">

    <div class="ticker-text">

        【NEWS】最新ニュースをここへ表示　NHK RSS連携予定

    </div>

</div>

<!-- ===================== -->
<!-- 交通情報 -->
<!-- ===================== -->

<div class="ticker traffic">

    <div class="ticker-text">

        【TRAFFIC】東名高速 渋滞5km　首都高 概ね順調

    </div>

</div>

<script>

/* ===================== */
/* 時計更新 */
/* ===================== */

function updateClock(){

    const now = new Date();

    /* デジタル */

    document.getElementById("clock").innerHTML =

        now.toLocaleTimeString('ja-JP',{

            hour:'2-digit',

            minute:'2-digit'

        });

    /* 日付 */

    document.getElementById("date").innerHTML =

        now.toLocaleDateString('ja-JP',{

            year:'numeric',

            month:'long',

            day:'numeric',

            weekday:'long'

        });

    /* アナログ */

    const sec = now.getSeconds();

    const min = now.getMinutes();

    const hour = now.getHours();

    const secDeg = sec * 6;

    const minDeg = min * 6 + sec * 0.1;

    const hourDeg = hour * 30 + min * 0.5;

    document.getElementById("second-hand").style.transform =

        `rotate(${secDeg}deg)`;

    document.getElementById("minute-hand").style.transform =

        `rotate(${minDeg}deg)`;

    document.getElementById("hour-hand").style.transform =

        `rotate(${hourDeg}deg)`;
}

setInterval(updateClock,1000);

updateClock();

</script>

</body>

</html>
